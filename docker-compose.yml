version: '3.8'

services:
  backend:
    build: ./backend
    container_name: health-analytics-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/health-analytics
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - app-network

  ml-service:
    build: ./ml-service
    container_name: health-analytics-ml
    ports:
      - "5001:5001"
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: health-analytics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: health-analytics-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:

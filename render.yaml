services:
  # Backend Service (Node.js)
  - type: web
    name: health-analytics-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        fromService:
          name: health-analytics-frontend
          type: static
          property: url
      - key: ML_SERVICE_URL
        fromService:
          name: health-analytics-ml
          type: web
          property: url

  # ML Service (Flask/Python)
  - type: web
    name: health-analytics-ml
    runtime: python
    plan: free
    buildCommand: cd ml-service && pip install -r requirements.txt
    startCommand: cd ml-service && python app.py
    envVars:
      - key: PORT
        value: 5001

  # Frontend (Static Site)
  - type: static
    name: health-analytics-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: health-analytics-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
